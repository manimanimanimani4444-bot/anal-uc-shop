<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

.page{display:none;}
.page.active{display:block;}

.header{
height:200px;
overflow:hidden;
}
.header img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.6);
}

.container{padding:15px;}

.menu-btn{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
text-align:center;
box-shadow:0 0 15px red;
}

.back{margin-bottom:10px;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.card{
background:#111;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 20px red;
}

.price{
color:#00ff88;
margin:10px 0;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:#fff;
font-weight:bold;
box-shadow:0 0 10px red;
margin-top:10px;
}

button:active{
transform:scale(0.9);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
box-shadow:0 0 10px red inset;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#111;
padding:20px;
border-radius:20px;
width:85%;
box-shadow:0 0 30px red;
text-align:center;
}

/* FIX ДЛЯ ТЕКСТА */
.success-text{
margin-top:10px;
color:#ccc;
word-wrap:break-word;
overflow-wrap:break-word;
word-break:break-word;
}

.success-icon{
font-size:50px;
color:#00ff88;
text-shadow:0 0 15px #00ff88;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">
<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('stars')">⭐ Stars</div>
</div>
</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">
<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="openModal('60 UC')">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="openModal('325 UC')">Купить</button>
</div>
</div>
</div>

<!-- STARS -->
<div id="stars" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="starsAmount" placeholder="Количество Stars">
<button onclick="buyStars()">Купить</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Введи PUBG ID</h3>
<input id="pubgId" placeholder="Например: 5123456789">

<button onclick="confirmBuy()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box">
<div class="success-icon">✔</div>
<h3>Успешно!</h3>
<div id="successText" class="success-text"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<script>

let currentItem="";

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function openModal(item){
currentItem=item;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmBuy(){
let id=document.getElementById("pubgId").value;

if(!id){
alert("Введи ID");
return;
}

closeModal();

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"Куплено: "+currentItem+"<br>ID: "+id;
}

function closeSuccess(){
document.getElementById("success").style.display="none";
}

/* STARS */
function buyStars(){
let amount=document.getElementById("starsAmount").value;

if(!amount){
alert("Введи количество");
return;
}

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"⭐ Куплено Stars: "+amount;
}

</script>

</body>
</html>
