<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 ANAL UC SHOP</title>

<style>
body {margin:0;font-family:Arial;background:#0a0000;color:white;}

.header {
    padding:20px;
    text-align:center;
    font-size:22px;
    background:red;
}

/* страницы */
.page {display:none;padding:15px;}
.active {display:block;}

/* кнопки */
.section {
    background:#111;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    text-align:center;
    box-shadow:0 0 10px red;
    font-size:18px;
}

/* карточки */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.card {
    background:#111;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px red;
}

.price {color:#00ff88;}

button {
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
}

/* кабинет */
.kabinet {
    background:#111;
    padding:15px;
    border-radius:15px;
    box-shadow:0 0 10px red;
}

/* назад */
.back {
    margin-bottom:10px;
    display:block;
    text-align:center;
    color:#aaa;
}
</style>
</head>

<body>

<div class="header">🔥 ANAL UC SHOP 🔥</div>

<!-- ГЛАВНАЯ -->
<div id="home" class="page active">

<h2>🎮 Разделы</h2>

<div class="section" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="section" onclick="steam()">💻 Steam</div>
<div class="section" onclick="stars()">⭐ Stars</div>
<div class="section" onclick="openPage('kabinet')">👤 Личный кабинет</div>

</div>

<!-- UC -->
<div id="uc" class="page">

<a class="back" onclick="openPage('home')">⬅ Назад</a>

<h2>💎 PUBG UC</h2>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="buy('325 UC',379)">Купить</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="buy('660 UC',749)">Купить</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">1890₽</div>
<button onclick="buy('1800 UC',1890)">Купить</button>
</div>

</div>

</div>

<!-- КАБИНЕТ -->
<div id="kabinet" class="page">

<a class="back" onclick="openPage('home')">⬅ Назад</a>

<h2>👤 Личный кабинет</h2>

<div class="kabinet" id="kabinetData">
Загрузка...
</div>

</div>

<script>

// ID пользователя
let user_id = localStorage.getItem("user_id");

if(!user_id){
    user_id = prompt("Придумай свой ID (например: 12345)");
    localStorage.setItem("user_id", user_id);
}

// покупки
let orders = JSON.parse(localStorage.getItem("orders")) || [];

// смена страницы
function openPage(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");
    if(page === "kabinet") loadKabinet();
}

// покупка
function buy(item, price){
    let pubg = prompt("Введите PUBG ID:");
    if(!pubg) return;

    let order = {
        item,
        price,
        date: new Date().toLocaleString()
    };

    orders.push(order);
    localStorage.setItem("orders", JSON.stringify(orders));

    alert("✅ Куплено: " + item);

}

// кабинет
function loadKabinet(){
    let total = 0;
    let html = `<b>ID:</b> ${user_id}<br><br>`;
    html += `<b>История:</b><br>`;

    orders.forEach(o=>{
        total += o.price;
        html += `📦 ${o.item} — ${o.price}₽<br>`;
    });

    html += `<br><b>💰 Всего потрачено: ${total}₽</b>`;

    document.getElementById("kabinetData").innerHTML = html;
}

// остальные функции
function steam(){
    let sum = prompt("Сумма Steam:");
    if(!sum) return;
    alert("Steam заказ принят");
}

function stars(){
    let amount = prompt("Stars:");
    if(!amount) return;
    alert("Stars заказ принят");
}

</script>

</body>
</html>
