<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAL SHOP</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:black;
    color:white;
}

/* HEADER */
.header {
    display:block;
}

.top-img {
    width:100%;
    height:200px;
    object-fit:cover;
}

.title {
    text-align:center;
    font-size:24px;
    padding:10px;
    background:red;
    font-weight:bold;
}

/* PAGE */
.page { display:none; padding:15px; }
.active { display:block; }

.menu-btn {
    background:#111;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px red;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.card {
    background:#111;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px red;
}

.price { color:#00ff88; }

button {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
}

.back { color:#aaa; margin-bottom:10px; }

/* MODAL */
.modal {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#111;
    padding:20px;
    border-radius:15px;
    width:80%;
    text-align:center;
}

.modal-box input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

.cancel { background:#555; }

/* SUCCESS */
.success {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00c853;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header" class="header">
<img src="https://picsum.photos/800/300" class="top-img">
<div class="title">🔥 ANAL SHOP 🔥</div>
</div>

<!-- MAIN -->
<div id="main" class="page active">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('stars')">⭐ Stars</div>
<div class="menu-btn" onclick="openPage('kabinet')">👤 Кабинет</div>
</div>

<!-- UC -->
<div id="uc" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>
<h2>UC</h2>

<div class="grid">
<div class="card"><h3>60 UC</h3><div class="price">75₽</div><button onclick="buy('60 UC',75)">Купить</button></div>
<div class="card"><h3>325 UC</h3><div class="price">379₽</div><button onclick="buy('325 UC',379)">Купить</button></div>
<div class="card"><h3>660 UC</h3><div class="price">749₽</div><button onclick="buy('660 UC',749)">Купить</button></div>
<div class="card"><h3>1800 UC</h3><div class="price">1890₽</div><button onclick="buy('1800 UC',1890)">Купить</button></div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>

<input type="number" id="steamSum" placeholder="Сумма">
<input type="text" id="steamLogin" placeholder="Логин">

<div id="result"></div>

<button onclick="calcSteam()">Рассчитать</button>
<button onclick="buySteam()">Купить</button>
</div>

<!-- STARS -->
<div id="stars" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>

<h2>⭐ Stars</h2>
<input type="number" id="starsAmount" placeholder="Сколько">
<button onclick="buyStars()">Купить</button>

</div>

<!-- KABINET -->
<div id="kabinet" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>
<div id="kabinetData"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Введите PUBG ID</h3>
<input id="pubgId">
<button onclick="confirmBuy()">OK</button>
<button onclick="closeModal()" class="cancel">Отмена</button>
</div>
</div>

<div id="success" class="success">✅ Успешно</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");
let currentItem="", currentPrice=0;

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");

/* СКРЫТИЕ ШАПКИ */
if(p === "main"){
    document.getElementById("header").style.display="block";
}else{
    document.getElementById("header").style.display="none";
}

if(p=="kabinet") loadKabinet();
}

function buy(item,price){
currentItem=item;
currentPrice=price;
document.getElementById("modal").style.display="flex";
}

function confirmBuy(){
let id=document.getElementById("pubgId").value;
if(!id)return;

orders.push({item:currentItem,price:currentPrice});
localStorage.setItem("orders",JSON.stringify(orders));

showSuccess();
closeModal();
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function showSuccess(){
let s=document.getElementById("success");
s.style.display="block";
setTimeout(()=>s.style.display="none",2000);
}

function loadKabinet(){
let html="",total=0;
orders.forEach(o=>{
total+=o.price;
html+=o.item+" "+o.price+"₽<br>";
});
html+="<br>💰 "+total+"₽";
document.getElementById("kabinetData").innerHTML=html;
}

/* STEAM */
function calcSteam(){
let sum=Number(document.getElementById("steamSum").value);
if(!sum)return;
document.getElementById("result").innerHTML="Итого: "+Math.floor(sum*1.15)+"₽";
}

function buySteam(){
let sum=Number(document.getElementById("steamSum").value);
let login=document.getElementById("steamLogin").value;
if(!sum||!login)return;

let total=Math.floor(sum*1.15);

orders.push({item:"Steam "+login,price:total});
localStorage.setItem("orders",JSON.stringify(orders));

showSuccess();
}

/* STARS */
function buyStars(){
let a=document.getElementById("starsAmount").value;
if(!a)return;

orders.push({item:"Stars "+a,price:a});
localStorage.setItem("orders",JSON.stringify(orders));

showSuccess();
}

</script>

</body>
</html>
