<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#ffffff,#eaeaea);
color:#000;
}

/* HEADER */
.header{
padding:15px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(0,0,0,0.1);
}

.header-title{
font-size:22px;
font-weight:bold;
}

.header-sub{
color:#777;
font-size:14px;
margin-top:5px;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

.container{
padding:15px;
padding-bottom:80px;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.4);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* STEAM BANNER */
.steam-banner{
margin-top:18px;
height:140px;
border-radius:20px;
background:url('https://i.postimg.cc/zDWSskNX/Screenshot-20260402-205842.jpg') center/cover no-repeat;
position:relative;
overflow:hidden;
display:flex;
align-items:flex-end;
padding:15px;
color:#fff;
font-size:22px;
font-weight:bold;
}

.steam-banner::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,rgba(0,0,0,0.2),rgba(0,0,0,0.7));
}

.steam-text{
position:relative;
z-index:2;
}

/* КНОПКИ */
.menu-btn{
padding:22px;
margin-top:18px;
text-align:center;
font-size:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
padding:20px;
text-align:center;
}

.price{
color:#0a8f4c;
font-size:18px;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#000;
color:#fff;
font-weight:bold;
margin-top:12px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
}

/* BACK */
.back{
margin-bottom:10px;
color:#555;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
padding:20px;
width:85%;
text-align:center;
}

/* BOTTOM MENU */
.bottom{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-around;
padding:10px;
border-radius:20px;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(20px);
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.bottom-btn{
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="header-title">ANAL_UC_BOT</div>
<div class="header-sub">Игровой магазин</div>
</div>

<!-- MAIN -->
<div id="main" class="page active">
<div class="container">

<div class="menu-btn glass" onclick="openPage('uc')">💎 PUBG UC</div>

<div class="steam-banner" onclick="openPage('steam')">
<div class="steam-text">STEAM</div>
</div>

<div class="menu-btn glass" onclick="openPage('stars')">⭐ Stars</div>

</div>
</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">

<div class="card glass">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="openModal('60 UC',75)">Купить</button>
</div>

<div class="card glass">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="openModal('325 UC',379)">Купить</button>
</div>

<div class="card glass">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="openModal('660 UC',749)">Купить</button>
</div>

<div class="card glass">
<h3>1800 UC</h3>
<div class="price">1990₽</div>
<button onclick="openModal('1800 UC',1990)">Купить</button>
</div>

</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">

<button onclick="buySteam()">Купить</button>
</div>

<!-- STARS -->
<div id="stars" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="starsAmount" placeholder="Количество Stars">
<button onclick="buyStars()">Купить</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box glass">
<h3>Введи PUBG ID</h3>
<input id="pubgId">
<button onclick="confirmBuy()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box glass">
<h3>Успешно</h3>
<div id="successText"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<!-- BOTTOM MENU -->
<div class="bottom">
<div class="bottom-btn" onclick="openReviews()">💬<br>Отзывы</div>
<div class="bottom-btn" onclick="openHelp()">🎧<br>Поддержка</div>
</div>

<script>
let currentItem="";
let currentPrice="";

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function openModal(item,price){
currentItem=item;
currentPrice=price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmBuy(){
let id=document.getElementById("pubgId").value;
if(!id){alert("Введи ID");return;}
closeModal();
openSuccess("Куплено: "+currentItem);
}

function closeSuccess(){
document.getElementById("success").style.display="none";
}

function buySteam(){
let sum=steamSum.value,login=steamLogin.value;
if(!sum||!login){alert("Заполни все");return;}
openSuccess("Steam: "+login);
}

function buyStars(){
let a=starsAmount.value;
if(!a){alert("Введи");return;}
openSuccess("Stars: "+a);
}

function openSuccess(text){
document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML=text;
}

function openReviews(){
window.open("https://t.me/anallodz","_blank");
}

function openHelp(){
window.open("https://t.me/Anallhelpbot","_blank");
}
</script>

</body>
</html>
