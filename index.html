<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PUBG UC SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #1a0000);
  color: white;
}

/* HEADER */
.header {
  padding: 15px;
  font-size: 20px;
  text-align: center;
  background: linear-gradient(90deg, #ff0000, #990000);
  font-weight: bold;
}

/* BANNER */
.banner {
  margin: 15px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
}

.banner img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.banner-text {
  position: absolute;
  bottom: 10px;
  left: 15px;
  font-size: 22px;
  font-weight: bold;
}

/* SECTION */
.section {
  padding: 15px;
}

.section h2 {
  margin-bottom: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* CARD */
.card {
  background: linear-gradient(145deg, #1f1f1f, #0f0f0f);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  border: 1px solid rgba(255,0,0,0.3);
  box-shadow: 0 0 10px rgba(255,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.uc {
  font-size: 20px;
  margin-bottom: 5px;
}

.price {
  color: #00ff99;
  margin-bottom: 10px;
}

.buy-btn {
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff0000, #ff7300);
  color: white;
  width: 100%;
}

/* CATEGORY */
.categories {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}

.cat {
  padding: 10px 15px;
  background: #1a1a1a;
  border-radius: 10px;
  white-space: nowrap;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:#111;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.modal-box button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:red;
  color:white;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">🔥 PUBG MOBILE UC SHOP</div>

<div class="banner">
  <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1?q=80&w=1400">
  <div class="banner-text">UC TOP-UP</div>
</div>

<div class="categories">
  <div class="cat">Популярное</div>
  <div class="cat">UC</div>
  <div class="cat">Prime</div>
  <div class="cat">Акции</div>
</div>

<div class="section">
  <h2>💎 UC Packs</h2>

  <div class="grid">
    <div class="card">
      <div class="uc">60 UC</div>
      <div class="price">75₽</div>
      <button class="buy-btn" onclick="buy()">Купить</button>
    </div>

    <div class="card">
      <div class="uc">325 UC</div>
      <div class="price">379₽</div>
      <button class="buy-btn" onclick="buy()">Купить</button>
    </div>

    <div class="card">
      <div class="uc">660 UC</div>
      <div class="price">749₽</div>
      <button class="buy-btn" onclick="buy()">Купить</button>
    </div>

    <div class="card">
      <div class="uc">1800 UC</div>
      <div class="price">1890₽</div>
      <button class="buy-btn" onclick="buy()">Купить</button>
    </div>
  </div>
</div>

<div class="section">
  <h2>⚡ Другие услуги</h2>

  <div class="grid">
    <div class="card" onclick="dev()">Коды</div>
    <div class="card" onclick="dev()">Автопополнение по ID</div>
    <div class="card" onclick="dev()">Prime / Prime+</div>
    <div class="card" onclick="dev()">Популярное</div>
  </div>
</div>

<script>
function buy(){
  alert("Оплата скоро будет 💳");
}

function dev(){
  alert("В разработке 🚧");
}
</script>

</body>
</html>
