<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* PAGE */
.page{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.3s;
}
.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

.container{
padding:15px;
}

/* НОВЫЙ МЕНЮ БЛОК */
.menu-block{
margin-top:20px;
}

.menu-title{
font-size:22px;
padding:20px;
text-align:center;
border-radius:15px;
border:1px solid #333;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(5px);
margin-bottom:10px;
transition:0.2s;
}
.menu-title:active{
transform:scale(0.95);
}

.menu-img{
width:100%;
height:140px;
object-fit:cover;
border-radius:15px;
opacity:0.8;
}

/* BACK */
.back{
margin-bottom:10px;
cursor:pointer;
opacity:0.8;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

/* CARD */
.card{
background:#111;
border-radius:18px;
padding:20px;
text-align:center;
border:1px solid #222;
transition:0.2s;
}
.card:hover{
transform:translateY(-5px);
}

.price{
color:#00ff88;
font-size:18px;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ff2a2a;
color:#fff;
font-weight:bold;
margin-top:12px;
transition:0.2s;
}
button:active{
transform:scale(0.92);
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
background:#0f0f0f;
border:1px solid #222;
color:#fff;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#0f0f0f;
padding:25px;
border-radius:18px;
width:85%;
text-align:center;
border:1px solid #222;
}

/* SUCCESS */
.success-icon{
font-size:50px;
color:#00ff88;
}

.success-text{
margin-top:10px;
color:#ccc;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">
<div class="container">

<div class="menu-block" onclick="openPage('uc')">
<div class="menu-title">💎 PUBG UC</div>
<img class="menu-img" src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="menu-block" onclick="openPage('steam')">
<div class="menu-title">💻 Steam</div>
<img class="menu-img" src="https://i.postimg.cc/3x7r9G0p/steam.jpg">
</div>

<div class="menu-block" onclick="openPage('stars')">
<div class="menu-title">⭐ Stars</div>
<img class="menu-img" src="https://i.postimg.cc/zf4G3YfR/stars.jpg">
</div>

</div>
</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">
<div class="card"><h3>60 UC</h3><div class="price">75₽</div><button onclick="openModal('60 UC',75)">Купить</button></div>
<div class="card"><h3>325 UC</h3><div class="price">379₽</div><button onclick="openModal('325 UC',379)">Купить</button></div>
<div class="card"><h3>660 UC</h3><div class="price">749₽</div><button onclick="openModal('660 UC',749)">Купить</button></div>
<div class="card"><h3>1800 UC</h3><div class="price">1990₽</div><button onclick="openModal('1800 UC',1990)">Купить</button></div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>
<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">
<button onclick="buySteam()">Купить</button>
</div>

<!-- STARS -->
<div id="stars" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>
<input id="starsAmount" placeholder="Количество Stars">
<button onclick="buyStars()">Купить</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Введи PUBG ID</h3>
<input id="pubgId" placeholder="Например: 5123456789">
<button onclick="confirmBuy()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box">
<div class="success-icon">✔</div>
<h3>Уведомление</h3>
<div id="successText" class="success-text"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<script>
let currentItem="";
let currentPrice="";
let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
setTimeout(()=>{document.getElementById(p).classList.add("active");},50);
}

function openModal(item,price){
currentItem=item;
currentPrice=price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function showMessage(text){
document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML = text;
}

function confirmBuy(){
let id=document.getElementById("pubgId").value;

if(!id){
showMessage("❗ Введи PUBG ID");
return;
}

orders.push({item:currentItem+" | ID:"+id,price:currentPrice});
localStorage.setItem("orders",JSON.stringify(orders));

closeModal();
showMessage("✅ Куплено: "+currentItem+"<br>ID: "+id);
}

function closeSuccess(){
document.getElementById("success").style.display="none";
}

function buySteam(){
let sum=document.getElementById("steamSum").value;
let login=document.getElementById("steamLogin").value;

if(!sum||!login){
showMessage("❗ Заполни все поля");
return;
}

orders.push({item:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));

showMessage("✅ Steam: "+login+"<br>Сумма: "+sum+"₽");
}

function buyStars(){
let amount=document.getElementById("starsAmount").value;

if(!amount){
showMessage("❗ Введи количество");
return;
}

orders.push({item:"Stars "+amount,price:amount});
localStorage.setItem("orders",JSON.stringify(orders));

showMessage("✅ Куплено Stars: "+amount);
}
</script>

</body>
</html>
