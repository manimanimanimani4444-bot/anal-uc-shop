<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#ffffff,#eaeaea);
color:#000;
}

/* HEADER */
.header{
padding:15px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(0,0,0,0.1);
}

.header-title{
font-size:22px;
font-weight:bold;
}

.header-sub{
color:#777;
font-size:14px;
margin-top:5px;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

.container{
padding:15px;
padding-bottom:80px;
}

/* GLASS */
.glass{
background:rgba(255,255,255,0.4);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.6);
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* STEAM NEW UI */
.steam-block{
background:#1a1d26;
color:#fff;
border-radius:20px;
padding:15px;
margin-top:15px;
}

.steam-input{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2a2e3a;
color:#fff;
margin-top:10px;
}

.switch{
display:flex;
background:#2a2e3a;
border-radius:12px;
margin-top:10px;
overflow:hidden;
}

.switch div{
flex:1;
padding:10px;
text-align:center;
color:#aaa;
cursor:pointer;
}

.switch .active{
background:#6c5ce7;
color:#fff;
}

.result{
margin-top:10px;
padding:12px;
border-radius:12px;
background:#2a2e3a;
}

/* КНОПКИ */
.menu-btn{
padding:16px;
margin-top:18px;
text-align:center;
font-size:18px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.card{
padding:20px;
text-align:center;
}

.price{
color:#0a8f4c;
font-size:18px;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#000;
color:#fff;
font-weight:bold;
margin-top:12px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.6);
}

/* BACK */
.back{
margin-bottom:10px;
color:#555;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
padding:20px;
width:85%;
text-align:center;
}

/* BOTTOM MENU */
.bottom{
position:fixed;
bottom:10px;
left:10px;
right:10px;
display:flex;
justify-content:space-around;
padding:10px;
border-radius:20px;
background:rgba(255,255,255,0.5);
backdrop-filter:blur(20px);
}

.bottom-btn{
text-align:center;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<div class="header-title">ANAL_UC_BOT</div>
<div class="header-sub">Игровой магазин</div>
</div>

<!-- MAIN -->
<div id="main" class="page active">
<div class="container">

<div class="menu-btn glass" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn glass" onclick="openPage('steam')">💳 Steam</div>
<div class="menu-btn glass" onclick="openPage('stars')">⭐ Stars</div>

</div>
</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">
<div class="card glass">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="openModal('60 UC',75)">Купить</button>
</div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="steam-block">
<div>Логин Steam</div>
<input id="steamLogin" class="steam-input" placeholder="Введите логин">
</div>

<div class="steam-block">
<div>Сумма пополнения</div>
<input id="steamSum" class="steam-input" placeholder="Введите сумму">

<div class="switch">
<div id="rubBtn" class="active" onclick="setCurrency('rub')">RUB</div>
<div id="usdBtn" onclick="setCurrency('usd')">USD</div>
</div>

<div id="steamResult" class="result">
Введите сумму
</div>
</div>

<button onclick="buySteam()">Купить</button>

</div>

<!-- STARS -->
<div id="stars" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="starsAmount" placeholder="Количество Stars">
<button onclick="buyStars()">Купить</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box glass">
<h3>Введи PUBG ID</h3>
<input id="pubgId">
<button onclick="confirmBuy()">Подтвердить</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box glass">
<h3>Успешно</h3>
<div id="successText"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<script>
let currency="rub";

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function setCurrency(c){
currency=c;
rubBtn.classList.remove("active");
usdBtn.classList.remove("active");
if(c==="rub") rubBtn.classList.add("active");
if(c==="usd") usdBtn.classList.add("active");
updateSteam();
}

function calcSteamTotal(sum){
return Math.ceil(sum * 1.15);
}

steamSum.addEventListener("input", updateSteam);

function updateSteam(){
let sum=parseFloat(steamSum.value);

if(!sum){
steamResult.innerHTML="Введите сумму";
return;
}

let total=calcSteamTotal(sum);

steamResult.innerHTML=
"Получите: "+sum+(currency==="usd"?"$":"₽")+"<br>"+
"К оплате: "+total+(currency==="usd"?"$":"₽");
}

function buySteam(){
let sum=steamSum.value;
let login=steamLogin.value;

if(!sum||!login){
alert("Заполни всё");
return;
}

openSuccess("Steam: "+login+"<br>Сумма: "+sum);
}

function buyStars(){
let a=starsAmount.value;
if(!a){alert("Введи");return;}
openSuccess("Stars: "+a);
}

function openModal(){}
function confirmBuy(){}
function closeSuccess(){
document.getElementById("success").style.display="none";
}
function openSuccess(text){
document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML=text;
}
</script>

</body>
  </html>
