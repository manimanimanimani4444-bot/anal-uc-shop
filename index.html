<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Shop</title>

<style>
body {
    margin: 0;
    background: #0b0b0b;
    color: white;
    font-family: Arial;
    text-align: center;
}

/* Шапка */
.header {
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

/* Контейнер */
.container {
    padding: 20px;
}

/* Карточки */
.cards {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    width: 140px;
    box-shadow: 0 0 20px red;
}

.price {
    color: lime;
    margin: 10px 0;
}

button {
    background: red;
    border: none;
    padding: 10px;
    border-radius: 10px;
    color: white;
    width: 100%;
    cursor: pointer;
}

/* Поля */
input {
    width: 85%;
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    border: none;
}

/* Результат */
.result {
    margin-top: 15px;
    color: lime;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">UC SHOP</div>

<div class="container">

    <!-- Карточки -->
    <div class="cards">
        <div class="card">
            <h3>60 UC</h3>
            <div class="price">75₽</div>
            <button onclick="selectUC(60)">Выбрать</button>
        </div>

        <div class="card">
            <h3>325 UC</h3>
            <div class="price">379₽</div>
            <button onclick="selectUC(325)">Выбрать</button>
        </div>
    </div>

    <!-- Ввод -->
    <input type="text" id="id" placeholder="Введи ID">
    <input type="number" id="amount" placeholder="Количество UC">

    <button onclick="calculate()">Рассчитать</button>
    <button onclick="buy()">Купить</button>

    <div class="result" id="result"></div>

</div>

<script>
// выбор из карточек
function selectUC(value) {
    document.getElementById("amount").value = value;
}

// расчёт
function calculate() {
    let uc = document.getElementById("amount").value;

    if (!uc) {
        alert("Введи количество UC");
        return;
    }

    let price = uc * 1.2;
    document.getElementById("result").innerText =
        "Цена: " + price + " ₽";
}

// покупка
function buy() {
    let id = document.getElementById("id").value;
    let uc = document.getElementById("amount").value;

    if (!id || !uc) {
        alert("Заполни все поля");
        return;
    }

    document.getElementById("result").innerText =
        "✅ Заявка отправлена!\nID: " + id + "\nUC: " + uc;
}
</script>

</body>
</html>
