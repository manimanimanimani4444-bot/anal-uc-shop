<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

/* HEADER */
.header{
height:200px;
}
.header img{
width:100%;
height:100%;
object-fit:cover;
}

/* CONTAINER */
.container{
padding:15px;
}

/* MENU */
.menu-btn{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
text-align:center;
box-shadow:0 0 10px red;
}

/* BACK */
.back{
margin-bottom:10px;
}

/* INPUT BLOCK */
.input-box{
background:#111;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 10px red;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
background:#000;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px; /* 👈 опустили ниже */
}

/* CARD */
.card{
background:#111;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 15px red;
}

.price{
color:#00ff88;
font-size:18px;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:red;
color:#fff;
font-weight:bold;
}

button:active{
transform:scale(0.95);
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">

<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('kabinet')">👤 Кабинет</div>
</div>

</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<!-- ВВОД ID -->
<div class="input-box">
Введи PUBG ID:
<input id="pubgId" placeholder="Например: 5123456789">
</div>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="buy('325 UC',379)">Купить</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="buy('660 UC',749)">Купить</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">1990₽</div>
<button onclick="buy('1800 UC',1990)">Купить</button>
</div>

</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">

<button onclick="buySteam()">Купить</button>
</div>

<!-- KABINET -->
<div id="kabinet" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div id="list"></div>
<br>
<div id="total"></div>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");

if(p==="kabinet") load();
}

/* UC */
function buy(item,price){
let id=document.getElementById("pubgId").value;

if(!id){
alert("Введи PUBG ID");
return;
}

orders.push({item:item+" | ID:"+id,price});
localStorage.setItem("orders",JSON.stringify(orders));

openPage('kabinet');
}

/* STEAM */
function buySteam(){
let sum=document.getElementById("steamSum").value;
let login=document.getElementById("steamLogin").value;

if(!sum||!login){
alert("Заполни все поля");
return;
}

orders.push({item:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));

openPage('kabinet');
}

/* LOAD */
function load(){
let html="",total=0;

orders.forEach(o=>{
html+=o.item+" - "+o.price+"₽<br>";
total+=Number(o.price);
});

document.getElementById("list").innerHTML=html;
document.getElementById("total").innerHTML="💰 Итого: "+total+"₽";
}

</script>

</body>
</html>
