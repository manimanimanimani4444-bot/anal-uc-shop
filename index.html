<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PUBG UC STORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0b0b;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.4) blur(2px);
}

.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  animation: fadeIn 1.5s ease;
}

.overlay h1 {
  font-size: 60px;
  letter-spacing: 2px;
}

.overlay p {
  color: #ff3c3c;
  font-size: 22px;
}

.overlay button {
  margin-top: 25px;
  padding: 14px 30px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg, #ff0000, #ff7300);
  color: white;
  font-size: 18px;
  cursor: pointer;
  transition: 0.3s;
}

.overlay button:hover {
  transform: scale(1.1);
}

/* STORE */
.store {
  display: none;
  padding: 30px;
  animation: fadeIn 1s ease;
}

.title {
  font-size: 28px;
  margin-bottom: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

.card h3 {
  margin: 10px 0;
  font-size: 22px;
}

.price {
  color: #00ff99;
  font-size: 18px;
}

.card button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #00cc66, #00ffcc);
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.card button:hover {
  transform: scale(1.1);
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437d1?q=80&w=1400">
  <div class="overlay">
    <h1>PUBG STORE</h1>
    <p>UC Packs Premium</p>
    <button onclick="openStore()">Войти в магазин</button>
  </div>
</div>

<!-- STORE -->
<div class="store" id="store">
  <div class="title">🔥 Популярные пакеты</div>

  <div class="grid">
    <div class="card">
      <h3>60 UC</h3>
      <div class="price">₽75</div>
      <button onclick="buy(75)">Купить</button>
    </div>

    <div class="card">
      <h3>325 UC</h3>
      <div class="price">₽379</div>
      <button onclick="buy(379)">Купить</button>
    </div>

    <div class="card">
      <h3>660 UC</h3>
      <div class="price">₽749</div>
      <button onclick="buy(749)">Купить</button>
    </div>

    <div class="card">
      <h3>1800 UC</h3>
      <div class="price">₽1890</div>
      <button onclick="buy(1890)">Купить</button>
    </div>
  </div>
</div>

<script>
function openStore() {
  document.querySelector('.hero').style.display = 'none';
  document.getElementById('store').style.display = 'block';
}

function buy(price) {
  alert("Оплата " + price + "₽ — подключи ЮKassa 💳");
}
</script>

</body>
</html>
