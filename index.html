<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">

.card:hover { transform: scale(1.03); box-shadow: 0 0 30px rgba(255,0,0,0.6); }

.card h2 { margin: 0; font-size: 28px; }

.card span { color: #ff4d4d; font-size: 18px; }

.card img { position: absolute; right: 10px; bottom: 0; height: 100px; opacity: 0.9; }

.footer { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 10px 0; }

.footer button { background: none; border: none; color: white; font-size: 14px; }

</style>
</head>
