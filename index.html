<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial;
}

/* HEADER */
.header {
    height:220px;
}

.header img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTAINER */
.container {
    padding:15px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* CARD */
.card {
    background:#111;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 20px red;
}

.price {
    color:#00ff88;
}

/* BUTTON */
button {
    margin-top:10px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:red;
    color:#fff;
    font-weight:bold;
    box-shadow:0 0 15px red;
}

button:active {
    transform:scale(0.95);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

/* PAGE */
.page { display:none; }
.page.active { display:block; }

/* BACK */
.back {
    margin-bottom:10px;
}

/* CLEAR BTN */
.clear {
    background:#555;
    box-shadow:none;
}
</style>
</head>

<body>

<div id="main" class="page active">

<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="buy('325 UC',379)">Купить</button>
</div>

</div>

<button onclick="openPage('steam')">💻 Steam</button>
<button onclick="openPage('kabinet')">👤 Кабинет</button>

</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="sum" placeholder="Сумма">
<input id="login" placeholder="Логин">

<button onclick="buySteam()">Купить</button>
</div>

<!-- KABINET -->
<div id="kabinet" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div id="list"></div>
<br>
<div id="total"></div>

<button class="clear" onclick="clearOrders()">🗑 Очистить покупки</button>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
document.getElementById(p).classList.add("active");

if(p==="kabinet") load();
}

function buy(name,price){
orders.push({name,price});
localStorage.setItem("orders",JSON.stringify(orders));

openPage('kabinet'); // ПЕРЕХОД
}

function buySteam(){
let sum=document.getElementById("sum").value;
let login=document.getElementById("login").value;

if(!sum||!login) return;

orders.push({name:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));

openPage('kabinet');
}

function load(){
let list="";
let total=0;

orders.forEach(o=>{
list+=o.name+" - "+o.price+"₽<br>";
total+=Number(o.price);
});

document.getElementById("list").innerHTML=list;
document.getElementById("total").innerHTML="💰 Итого: "+total+"₽";
}

function clearOrders(){
orders=[];
localStorage.setItem("orders","[]");
load();
}

</script>

</body>
</html>
