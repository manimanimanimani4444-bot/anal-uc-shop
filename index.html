<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZARAZA SHOP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0a0000, #1a0000);
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(90deg, red, darkred);
}

/* CONTAINER */
.container {
    padding: 15px;
}

/* CATEGORY BUTTONS */
.categories {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.cat {
    padding: 10px 15px;
    background: #111;
    border-radius: 10px;
    white-space: nowrap;
}

/* CARD GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 15px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 10px red;
}

.price {
    color: #00ff88;
    font-size: 18px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: red;
    color: white;
    font-weight: bold;
}

/* OTHER SERVICES */
.service {
    background: #111;
    padding: 15px;
    border-radius: 15px;
    margin-top: 10px;
    text-align: center;
    box-shadow: 0 0 8px red;
}
</style>
</head>

<body>

<div class="header">🔥 ZARAZA UC SHOP 🔥</div>

<div class="container">

<h2>UC TOP-UP</h2>

<div class="categories">
<div class="cat">Популярное</div>
<div class="cat">UC</div>
<div class="cat">Steam</div>
<div class="cat">Stars</div>
</div>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="buy('325 UC',379)">Купить</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="buy('660 UC',749)">Купить</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">1890₽</div>
<button onclick="buy('1800 UC',1890)">Купить</button>
</div>

</div>

<h2>⚡ Другие услуги</h2>

<div class="service" onclick="steam()">💻 Пополнение Steam</div>
<div class="service" onclick="stars()">⭐ Telegram Stars</div>
<div class="service" onclick="auto()">🤖 Автопополнение по ID</div>

</div>

<script>

function buy(item, price) {
    let id = prompt("Введите PUBG ID:");
    if (!id) return;

    let contact = prompt("Ваш Telegram:");
    if (!contact) return;

    alert("✅ Заказ принят\n\n📦 " + item + "\n💰 " + price + "₽\n\n⏳ Ожидайте 5-15 мин");

    // позже подключим оплату / Telegram
}

function steam() {
    let sum = prompt("Введите сумму пополнения Steam:");
    alert("💻 Steam заказ на " + sum + "₽ принят");
}

function stars() {
    let amount = prompt("Сколько Stars?");
    alert("⭐ Заказ на " + amount + " Stars принят");
}

function auto() {
    alert("🤖 Автовыдача скоро будет доступна");
}

</script>

</body>
</html>
