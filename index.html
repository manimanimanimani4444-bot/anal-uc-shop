<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAL UC SHOP</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000000);
  color: white;
  overflow-x: hidden;
}.header { padding: 25px; text-align: center; font-size: 26px; font-weight: bold; letter-spacing: 2px; background: linear-gradient(90deg, #ff0000, #000); box-shadow: 0 0 25px rgba(255,0,0,0.6); }

.hero { position: relative; height: 300px; background: url('ghost.png') center/cover no-repeat; display: flex; align-items: flex-end; justify-content: center; }

.hero::after { content: ''; position: absolute; bottom: 0; width: 100%; height: 100px; background: linear-gradient(to top, #000, transparent); }

.hero h1 { position: relative; z-index: 2; font-size: 28px; margin-bottom: 20px; text-shadow: 0 0 20px red; }

.container { padding: 15px; }

.card { border-radius: 25px; padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, #140000, #2b0000); box-shadow: 0 0 30px rgba(255,0,0,0.25); transition: 0.4s; position: relative; }

.card::before { content: ''; position: absolute; inset: 0; border-radius: 25px; background: linear-gradient(45deg, transparent, rgba(255,0,0,0.4), transparent); opacity: 0; transition: 0.4s; }

.card:hover::before { opacity: 1; }

.card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 0 40px rgba(255,0,0,0.6); }

.card h2 { margin: 0; font-size: 24px; }

.card span { color: #ff4d4d; }

.price { margin-top: 10px; font-size: 18px; color: #fff; }

.footer { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: rgba(0,0,0,0.9); padding: 10px 0; backdrop-filter: blur(10px); }

.footer button { background: none; border: none; color: white; font-size: 14px; transition: 0.3s; }

.footer button:hover { color: red; }

</style>
</head>
<body><div class="header">🔥 ANAL UC SHOP 🔥</div><div class="hero">
  <h1>SECRET STORE</h1>
</div><div class="container"><div class="card">
  <h2>PUBG MOBILE</h2>
  <span>UC Packs</span>
  <div class="price">60 UC — 80₽</div>
</div><div class="card">
  <h2>FREE FIRE</h2>
  <span>Diamonds</span>
  <div class="price">100 💎 — 90₽</div>
</div><div class="card">
  <h2>MOBILE LEGENDS</h2>
  <span>Diamonds</span>
  <div class="price">86 💎 — 120₽</div>
</div><div class="card">
  <h2>GENSHIN IMPACT</h2>
  <span>Crystals</span>
  <div class="price">300 💎 — 350₽</div>
</div></div><div class="footer">
  <button>🏠 Главная</button>
  <button>🛒 Магазин</button>
  <button>📦 Заказы</button>
  <button>💬 Поддержка</button>
</div></body>
</html>
