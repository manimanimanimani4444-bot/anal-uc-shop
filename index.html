<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
}

/* PAGE */
.page{display:none;}
.page.active{display:block;}

/* HEADER */
.header{
height:200px;
overflow:hidden;
}
.header img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.6);
}

/* CONTAINER */
.container{
padding:15px;
}

/* MENU */
.menu-btn{
background:#111;
padding:15px;
border-radius:15px;
margin-top:10px;
text-align:center;
box-shadow:0 0 15px red;
transition:0.2s;
}
.menu-btn:active{
transform:scale(0.95);
}

/* BACK */
.back{
margin-bottom:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

/* CARD */
.card{
background:#111;
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 20px red;
}

.price{
color:#00ff88;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:#fff;
font-weight:bold;
box-shadow:0 0 10px red;
margin-top:10px;
}
button:active{
transform:scale(0.9);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#000;
color:#fff;
box-shadow:0 0 10px red inset;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#111;
padding:20px;
border-radius:20px;
width:85%;
box-shadow:0 0 30px red;
text-align:center;
animation:pop 0.2s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

/* SUCCESS MODAL */
.success{
text-align:center;
}

.success-icon{
font-size:50px;
color:#00ff88;
text-shadow:0 0 15px #00ff88;
margin-bottom:10px;
}

.success-text{
margin-top:10px;
color:#ccc;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">

<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
</div>

</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="openModal('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="openModal('325 UC',379)">Купить</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="openModal('660 UC',749)">Купить</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">1990₽</div>
<button onclick="openModal('1800 UC',1990)">Купить</button>
</div>

</div>
</div>

<!-- MODAL INPUT -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Введи PUBG ID</h3>
<input id="pubgId" placeholder="Например: 5123456789">

<button onclick="confirmBuy()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box success">
<div class="success-icon">✔</div>
<h3>Успешно!</h3>
<div class="success-text" id="successText"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<script>

let currentItem="";
let currentPrice="";

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function openModal(item,price){
currentItem=item;
currentPrice=price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* КРАСИВОЕ ПОДТВЕРЖДЕНИЕ */
function confirmBuy(){
let id=document.getElementById("pubgId").value;

if(!id){
alert("Введи ID");
return;
}

closeModal();

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"Куплено: "+currentItem+"<br>ID: "+id;
}

function closeSuccess(){
document.getElementById("success").style.display="none";
}

</script>

</body>
</html>
