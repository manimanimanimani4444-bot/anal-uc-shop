<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAL UC SHOP</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: url("https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg") no-repeat center/cover;
    min-height: 100vh;
    color: white;
}

/* затемнение */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
}

/* контейнер */
.container {
    position: relative;
    z-index: 2;
    padding: 20px;
}

/* заголовок */
.title {
    text-align: center;
    font-size: 32px;
    margin-bottom: 30px;
    text-shadow: 0 0 20px #00fff7;
}

/* карточки */
.shop {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

/* стекло */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    backdrop-filter: blur(15px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 0 25px rgba(0,255,255,0.4);
}

/* кнопка */
.btn {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: linear-gradient(45deg, #00fff7, #0066ff);
    color: black;
    font-weight: bold;
    transition: 0.2s;
    box-shadow: 0 0 10px #00fff7;
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00fff7, 0 0 40px #0066ff;
}

/* модалка */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.7);
    z-index: 5;
}

.modal-content {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    text-align: center;
    animation: fade 0.3s ease;
}

@keyframes fade {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

input {
    padding: 10px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    width: 200px;
}

/* кнопки модалки */
.modal button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #00fff7;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">ANAL UC SHOP</div>

    <div class="shop">
        <div class="card">
            <h2>60 UC</h2>
            <p>1$</p>
            <button class="btn" onclick="buy('60 UC')">Купить</button>
        </div>

        <div class="card">
            <h2>325 UC</h2>
            <p>5$</p>
            <button class="btn" onclick="buy('325 UC')">Купить</button>
        </div>

        <div class="card">
            <h2>660 UC</h2>
            <p>10$</p>
            <button class="btn" onclick="buy('660 UC')">Купить</button>
        </div>
    </div>
</div>

<!-- модалка -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2>Введите ID</h2>
        <input type="text" id="userId" placeholder="Ваш ID">
        <br>
        <button onclick="confirmBuy()">Оплатить</button>
        <br>
        <button onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
let selectedProduct = "";

function buy(product) {
    selectedProduct = product;
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function confirmBuy() {
    let id = document.getElementById("userId").value;

    if (!id) {
        alert("Введите ID");
        return;
    }

    alert("Покупка: " + selectedProduct + "\\nID: " + id + "\\n(тут будет оплата)");
    
    closeModal();
}
</script>

</body>
</html>
