<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAL UC SHOP</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0a0000, #1a0000);
    color: white;
}

.header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: linear-gradient(90deg, red, darkred);
}

.page { display: none; padding: 15px; }
.active { display: block; }

.menu-btn {
    background:#111;
    padding:15px;
    margin-top:10px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 10px red;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    margin-top: 15px;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 10px red;
}

.price { color: #00ff88; font-size: 18px; }

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: red;
    color: white;
    font-weight: bold;
}

.back { margin-bottom: 10px; color: #aaa; }

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:#111;
    padding:20px;
    border-radius:15px;
    width:80%;
    text-align:center;
    box-shadow:0 0 15px red;
}

.modal-box input {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

.cancel { background:#555; }

/* SUCCESS */
.success {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #00c853;
    padding: 15px 25px;
    border-radius: 10px;
    display: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">🔥 ANAL UC SHOP 🔥</div>

<!-- MAIN -->
<div id="main" class="page active">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('kabinet')">👤 Личный кабинет</div>
</div>

<!-- UC -->
<div id="uc" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>
<h2>💎 PUBG UC</h2>

<div class="grid">
<div class="card"><h3>60 UC</h3><div class="price">75₽</div><button onclick="buy('60 UC',75)">Купить</button></div>
<div class="card"><h3>325 UC</h3><div class="price">379₽</div><button onclick="buy('325 UC',379)">Купить</button></div>
<div class="card"><h3>660 UC</h3><div class="price">749₽</div><button onclick="buy('660 UC',749)">Купить</button></div>
<div class="card"><h3>1800 UC</h3><div class="price">1890₽</div><button onclick="buy('1800 UC',1890)">Купить</button></div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>

<h2>💻 Пополнение Steam</h2>

<input type="number" id="steamSum" placeholder="Введите сумму" style="width:100%;padding:10px;border-radius:10px;border:none;">
<input type="text" id="steamLogin" placeholder="Ваш логин Steam" style="width:100%;padding:10px;border-radius:10px;border:none;margin-top:10px;">

<div id="result" style="margin-top:10px;"></div>

<button onclick="calcSteam()">Рассчитать</button>
<button onclick="buySteam()">Оплатить</button>

</div>

<!-- KABINET -->
<div id="kabinet" class="page">
<div class="back" onclick="openPage('main')">← Назад</div>
<h2>👤 Личный кабинет</h2>
<div id="kabinetData"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Введите PUBG ID</h3>
    <input type="text" id="pubgId" placeholder="Ваш ID">
    <button onclick="confirmBuy()">Подтвердить</button>
    <button onclick="closeModal()" class="cancel">Отмена</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="success" class="success">✅ Покупка успешна</div>

<script>

let currentItem = "";
let currentPrice = 0;

let user_id = localStorage.getItem("user_id");
if(!user_id){
    user_id = "user_" + Math.floor(Math.random()*100000);
    localStorage.setItem("user_id", user_id);
}

let orders = JSON.parse(localStorage.getItem("orders") || "[]");

function openPage(page){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(page).classList.add("active");

    if(page === "kabinet") loadKabinet();
}

function buy(item, price){
    currentItem = item;
    currentPrice = price;
    document.getElementById("modal").style.display = "flex";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function confirmBuy(){
    let id = document.getElementById("pubgId").value;
    if(!id) return;

    orders.push({item: currentItem, price: currentPrice});
    localStorage.setItem("orders", JSON.stringify(orders));

    showSuccess();
    closeModal();
}

function showSuccess(){
    let el = document.getElementById("success");
    el.style.display = "block";

    setTimeout(()=>{
        el.style.display = "none";
    }, 2000);
}

function loadKabinet(){
    let html = `<b>ID:</b> ${user_id}<br><br>`;
    let total = 0;

    orders.forEach(o=>{
        total += o.price;
        html += `📦 ${o.item} — ${o.price}₽<br>`;
    });

    html += `<br><b>💰 Всего: ${total}₽</b>`;

    document.getElementById("kabinetData").innerHTML = html;
}

/* STEAM */
function calcSteam(){
    let sum = Number(document.getElementById("steamSum").value);
    if(!sum) return;

    let total = Math.floor(sum * 1.15);

    document.getElementById("result").innerHTML =
        "💰 К оплате: " + total + "₽";
}

function buySteam(){
    let sum = Number(document.getElementById("steamSum").value);
    let login = document.getElementById("steamLogin").value;

    if(!sum || !login) return;

    let total = Math.floor(sum * 1.15);

    orders.push({
        item: "Steam " + sum + "₽ (" + login + ")",
        price: total
    });

    localStorage.setItem("orders", JSON.stringify(orders));

    showSuccess();
}

</script>

</body>
</html>
