<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAL UC SHOP</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000);
  color: white;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(90deg, red, black);
  box-shadow: 0 0 20px red;
}

.hero {
  position: relative;
  height: 320px;
  overflow: hidden;
}

.hero img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}

.hero h1 {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 28px;
  text-shadow: 0 0 15px red;
}

.container {
  padding: 15px;
}

.card {
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  background: linear-gradient(135deg, #140000, #2b0000);
  box-shadow: 0 0 25px rgba(255,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
  box-shadow: 0 0 40px red;
}

.card h2 {
  margin: 0;
  font-size: 22px;
}

.card span {
  color: #ff4d4d;
}

.price {
  margin-top: 10px;
}

.footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  background: #111;
  padding: 10px 0;
}

.footer button {
  background: none;
  border: none;
  color: white;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="header">🔥 ANAL UC SHOP 🔥</div>

<div class="hero">
  <img src="https://i.imgur.com/8Km9tLL.jpg">
  <h1>SECRET STORE</h1>
</div>

<div class="container">

<div class="card">
  <h2>PUBG MOBILE</h2>
  <span>UC Packs</span>
  <div class="price">60 UC — 80₽</div>
</div>

<div class="card">
  <h2>FREE FIRE</h2>
  <span>Diamonds</span>
  <div class="price">100 💎 — 90₽</div>
</div>

<div class="card">
  <h2>MOBILE LEGENDS</h2>
  <span>Diamonds</span>
  <div class="price">86 💎 — 120₽</div>
</div>

<div class="card">
  <h2>GENSHIN IMPACT</h2>
  <span>Crystals</span>
  <div class="price">300 💎 — 350₽</div>
</div>

</div>

<div class="footer">
  <button>🏠 Главная</button>
  <button>🛒 Магазин</button>
  <button>📦 Заказы</button>
  <button>💬 Поддержка</button>
</div>

</body>
</html>
