<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* HEADER */
.header {
    height:220px;
}
.header img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* PAGE */
.page { display:none; }
.page.active { display:block; }

/* CONTAINER */
.container {
    padding:15px;
}

/* MENU */
.menu-btn {
    background:#111;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
    text-align:center;
    box-shadow:0 0 15px red;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

/* CARD */
.card {
    background:#111;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 20px red;
}

.price { color:#00ff88; }

/* BUTTON */
button {
    margin-top:10px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-weight:bold;
    box-shadow:0 0 15px red;
}

button:active {
    transform:scale(0.95);
}

/* INPUT */
input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

/* LOADER */
.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.spinner{
width:60px;
height:60px;
border:5px solid #333;
border-top:5px solid red;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:15px;
}

@keyframes spin{
to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">

<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('kabinet')">👤 Кабинет</div>
</div>

</div>

<!-- UC -->
<div id="uc" class="page container">
<div onclick="openPage('main')">← Назад</div>

<div class="grid">

<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button onclick="buy('325 UC',379)">Купить</button>
</div>

<div class="card">
<h3>660 UC</h3>
<div class="price">749₽</div>
<button onclick="buy('660 UC',749)">Купить</button>
</div>

<div class="card">
<h3>1800 UC</h3>
<div class="price">1990₽</div>
<button onclick="buy('1800 UC',1990)">Купить</button>
</div>

</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div onclick="openPage('main')">← Назад</div>

<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">

<button onclick="buySteam()">Купить</button>
</div>

<!-- KABINET -->
<div id="kabinet" class="page container">
<div onclick="openPage('main')">← Назад</div>

<div id="list"></div>
<br>
<div id="total"></div>
</div>

<!-- LOADER -->
<div id="loader" class="loader">
<div class="spinner"></div>
<div id="loaderText">Обработка заказа...</div>
</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");

if(p==="kabinet") load();
}

/* ОБРАБОТКА */
function processOrder(callback){
let loader=document.getElementById("loader");
let text=document.getElementById("loaderText");

loader.style.display="flex";
text.innerText="Обработка заказа...";

setTimeout(()=>{
text.innerText="Проверка оплаты...";

setTimeout(()=>{
text.innerText="Успешно ✅";

setTimeout(()=>{
loader.style.display="none";
callback();
},1000);

},1500);

},1500);
}

/* UC */
function buy(item,price){
let id = prompt("Введи PUBG ID:");
if(!id) return;

orders.push({item:item+" | ID:"+id,price});
localStorage.setItem("orders",JSON.stringify(orders));

processOrder(()=>openPage('kabinet'));
}

/* STEAM */
function buySteam(){
let sum=document.getElementById("steamSum").value;
let login=document.getElementById("steamLogin").value;

if(!sum||!login)return;

orders.push({item:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));

processOrder(()=>openPage('kabinet'));
}

/* LOAD */
function load(){
let html="",total=0;

orders.forEach(o=>{
html+=o.item+" - "+o.price+"₽<br>";
total+=Number(o.price);
});

document.getElementById("list").innerHTML=html;
document.getElementById("total").innerHTML="💰 Итого: "+total+"₽";
}

</script>

</body>
</html>
