<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
overflow-x:hidden;
}

/* PAGE */
.page{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.3s;
}
.page.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* HEADER */
.header{
height:200px;
overflow:hidden;
}
.header img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.7);
}

/* CONTAINER */
.container{
padding:15px;
}

/* MENU */
.menu-btn{
background:linear-gradient(145deg,#111,#1a1a1a);
padding:15px;
border-radius:15px;
margin-top:12px;
text-align:center;
box-shadow:0 0 15px rgba(255,0,0,0.6);
transition:0.2s;
}
.menu-btn:active{
transform:scale(0.95);
}

/* BACK */
.back{
margin-bottom:10px;
cursor:pointer;
opacity:0.8;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

/* CARD */
.card{
background:linear-gradient(145deg,#111,#1a1a1a);
border-radius:20px;
padding:20px;
text-align:center;
box-shadow:0 0 20px rgba(255,0,0,0.5);
transition:0.2s;
}
.card:hover{
transform:translateY(-5px);
}

.price{
color:#00ff88;
font-size:18px;
margin:10px 0;
text-shadow:0 0 10px #00ff88;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(145deg,#ff0000,#990000);
color:#fff;
font-weight:bold;
margin-top:12px;
box-shadow:
0 0 15px rgba(255,0,0,0.7),
inset 0 0 5px rgba(255,255,255,0.2);
transition:0.2s;
}
button:hover{
box-shadow:
0 0 25px rgba(255,0,0,1),
0 0 40px rgba(255,0,0,0.5);
}
button:active{
transform:scale(0.92);
}

/* INPUT */
input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#050505;
color:#fff;
box-shadow:
inset 0 0 10px rgba(255,0,0,0.6),
0 0 10px rgba(255,0,0,0.3);
outline:none;
transition:0.2s;
box-sizing:border-box;
}
input:focus{
box-shadow:
inset 0 0 15px rgba(255,0,0,1),
0 0 15px rgba(255,0,0,0.8);
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

/* PUBG MODAL */
.modal-box{
background:linear-gradient(145deg,#0a0a0a,#1a1a1a);
padding:25px;
border-radius:20px;
width:85%;
text-align:center;
box-shadow:
0 0 25px rgba(255,0,0,0.6),
0 0 60px rgba(255,0,0,0.2),
inset 0 0 10px rgba(255,255,255,0.05);
border:1px solid rgba(255,0,0,0.3);
animation:pop 0.25s ease;
position:relative;
overflow:hidden;
}

.modal-box::before{
content:"";
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent,rgba(255,0,0,0.25),transparent);
transform:rotate(25deg);
animation:shine 3s linear infinite;
}

.modal-box h3{
text-shadow:0 0 10px red;
}

/* SUCCESS */
.success-icon{
font-size:50px;
color:#00ff88;
text-shadow:0 0 10px #00ff88;
}

.success-text{
margin-top:10px;
color:#ccc;
word-break:break-word;
}

/* ANIMATIONS */
@keyframes shine{
0%{transform:translateX(-100%) rotate(25deg);}
100%{transform:translateX(100%) rotate(25deg);}
}

@keyframes pop{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="main" class="page active">
<div class="header">
<img src="https://i.postimg.cc/jSQbLd2t/IMG-20260402-002558-403.jpg">
</div>

<div class="container">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('stars')">⭐ Stars</div>
</div>
</div>

<!-- UC -->
<div id="uc" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">
<div class="card"><h3>60 UC</h3><div class="price">75₽</div><button onclick="openModal('60 UC',75)">Купить</button></div>
<div class="card"><h3>325 UC</h3><div class="price">379₽</div><button onclick="openModal('325 UC',379)">Купить</button></div>
<div class="card"><h3>660 UC</h3><div class="price">749₽</div><button onclick="openModal('660 UC',749)">Купить</button></div>
<div class="card"><h3>1800 UC</h3><div class="price">1990₽</div><button onclick="openModal('1800 UC',1990)">Купить</button></div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>
<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">
<button onclick="buySteam()">Купить</button>
</div>

<!-- STARS -->
<div id="stars" class="page container">
<div class="back" onclick="openPage('main')">← Назад</div>
<input id="starsAmount" placeholder="Количество Stars">
<button onclick="buyStars()">Купить</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<h3>Введи PUBG ID</h3>
<input id="pubgId" placeholder="Например: 5123456789">
<button onclick="confirmBuy()">Подтвердить</button>
<button onclick="closeModal()">Отмена</button>
</div>
</div>

<!-- SUCCESS -->
<div id="success" class="modal">
<div class="modal-box">
<div class="success-icon">✔</div>
<h3>Успешно</h3>
<div id="successText" class="success-text"></div>
<button onclick="closeSuccess()">OK</button>
</div>
</div>

<script>
let currentItem="";
let currentPrice="";
let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
setTimeout(()=>{document.getElementById(p).classList.add("active");},50);
}

function openModal(item,price){
currentItem=item;
currentPrice=price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmBuy(){
let id=document.getElementById("pubgId").value;
if(!id){alert("Введи ID");return;}

orders.push({item:currentItem+" | ID:"+id,price:currentPrice});
localStorage.setItem("orders",JSON.stringify(orders));

closeModal();

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"Куплено: "+currentItem+"<br>ID: "+id;
}

function closeSuccess(){
document.getElementById("success").style.display="none";
}

function buySteam(){
let sum=document.getElementById("steamSum").value;
let login=document.getElementById("steamLogin").value;
if(!sum||!login){alert("Заполни все поля");return;}

orders.push({item:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"Steam: "+login+"<br>Сумма: "+sum+"₽";
}

function buyStars(){
let amount=document.getElementById("starsAmount").value;
if(!amount){alert("Введи количество");return;}

orders.push({item:"Stars "+amount,price:amount});
localStorage.setItem("orders",JSON.stringify(orders));

document.getElementById("success").style.display="flex";
document.getElementById("successText").innerHTML =
"Куплено Stars: "+amount;
}
</script>

</body>
  </html>
