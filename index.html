<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC SHOP</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
}

/* HEADER */
.header {
    position:relative;
    height:240px;
    overflow:hidden;
}

.header img {
    width:100%;
    height:100%;
    object-fit:cover;
}

/* затемнение */
.header::after {
    content:"";
    position:absolute;
    top:0;left:0;
    width:100%;height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), #000);
}

/* название */
.title {
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

/* контейнер */
.container {
    padding:15px;
    margin-top:-20px;
}

/* кнопки */
.menu-btn {
    background:#0a0a0a;
    padding:18px;
    margin-top:15px;
    border-radius:20px;
    text-align:center;
    font-size:18px;
    box-shadow:0 0 25px rgba(255,0,0,0.7);
    transition:0.25s;
}

.menu-btn:active {
    transform:scale(0.95);
}

/* страницы */
.page {
    display:none;
    animation:fade 0.3s;
}

.page.active {
    display:block;
}

@keyframes fade {
    from {opacity:0; transform:translateX(20px);}
    to {opacity:1; transform:translateX(0);}
}

/* назад */
.back {
    color:#aaa;
    margin-bottom:10px;
}

/* карточки */
.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.card {
    background:#111;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 12px red;
}

.price {
    color:#00ff88;
}

.buy {
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-weight:bold;
}

/* input */
input {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

/* success */
.success {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#00c853;
    padding:10px 20px;
    border-radius:10px;
    display:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<img src="https://i.imgur.com/hoJ9ssU.jpeg">
<div class="title">🔥 UC SHOP 🔥</div>
</div>

<!-- MAIN -->
<div id="main" class="container page active">
<div class="menu-btn" onclick="openPage('uc')">💎 PUBG UC</div>
<div class="menu-btn" onclick="openPage('steam')">💻 Steam</div>
<div class="menu-btn" onclick="openPage('stars')">⭐ Stars</div>
<div class="menu-btn" onclick="openPage('kabinet')">👤 Кабинет</div>
</div>

<!-- UC -->
<div id="uc" class="container page">
<div class="back" onclick="openPage('main')">← Назад</div>

<div class="grid">
<div class="card">
<h3>60 UC</h3>
<div class="price">75₽</div>
<button class="buy" onclick="buy('60 UC',75)">Купить</button>
</div>

<div class="card">
<h3>325 UC</h3>
<div class="price">379₽</div>
<button class="buy" onclick="buy('325 UC',379)">Купить</button>
</div>
</div>
</div>

<!-- STEAM -->
<div id="steam" class="container page">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="steamSum" placeholder="Сумма">
<input id="steamLogin" placeholder="Логин">
<button class="buy" onclick="buySteam()">Купить</button>
</div>

<!-- STARS -->
<div id="stars" class="container page">
<div class="back" onclick="openPage('main')">← Назад</div>

<input id="starsAmount" placeholder="Количество">
<button class="buy" onclick="buyStars()">Купить</button>
</div>

<!-- KABINET -->
<div id="kabinet" class="container page">
<div class="back" onclick="openPage('main')">← Назад</div>
<div id="kabinetData"></div>
</div>

<div id="success" class="success">✅ Успешно</div>

<script>

let orders = JSON.parse(localStorage.getItem("orders")||"[]");

function openPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");

if(p==="kabinet") loadKabinet();
}

function buy(item,price){
orders.push({item,price});
localStorage.setItem("orders",JSON.stringify(orders));
show();
}

function buySteam(){
let sum=document.getElementById("steamSum").value;
let login=document.getElementById("steamLogin").value;

if(!sum||!login)return;

orders.push({item:"Steam "+login,price:sum});
localStorage.setItem("orders",JSON.stringify(orders));
show();
}

function buyStars(){
let a=document.getElementById("starsAmount").value;
if(!a)return;

orders.push({item:"Stars "+a,price:a});
localStorage.setItem("orders",JSON.stringify(orders));
show();
}

function loadKabinet(){
let html="",total=0;

orders.forEach(o=>{
total+=Number(o.price);
html+=o.item+" - "+o.price+"₽<br>";
});

html+="<br>💰 Итого: "+total+"₽";
document.getElementById("kabinetData").innerHTML=html;
}

function show(){
let s=document.getElementById("success");
s.style.display="block";
setTimeout(()=>s.style.display="none",2000);
}

</script>

</body>
</html>
